# 服务器配置
server:
  port: 8080

spring:
  application:
    name: pos-platform

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:pos_platform}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}

  # Redis配置
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: 0
    timeout: 5000
    jedis:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

  # Jackson配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

# MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.pos.platform.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deletedAt
      logic-delete-value: now()
      logic-not-delete-value: NULL
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT配置
jwt:
  secret: ${JWT_SECRET:pos-platform-secret-key-change-in-production}
  mini-expire-time: 604800000  # 小程序Token有效期7天(毫秒)
  admin-expire-time: 7200000   # 管理端Token有效期2小时(毫秒)

# 微信小程序配置
wx:
  miniapp:
    configs:
      - appid: ${WX_APPID:}
        secret: ${WX_SECRET:}
        token: ${WX_TOKEN:}
        aesKey: ${WX_AES_KEY:}
        msgDataFormat: JSON

# 系统配置
sys:
  # 短信配置
  sms:
    expire-seconds: 300         # 验证码有效期5分钟
    send-interval-seconds: 60   # 发送间隔60秒

  # 文件上传路径
  upload:
    path: /data/upload
    base-url: ${FILE_BASE_URL:http://localhost:8080}

# 日志配置
logging:
  level:
    root: info
    com.pos.platform: debug
    cn.binarywang.wx.miniapp: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"